spring:
  application:
    name: nlia-disaster

  datasource:
    url: jdbc:mysql://localhost:3306/nlia_disaster?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
    username: ${DB_USERNAME:nlia}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  jackson:
    time-zone: Asia/Taipei
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

server:
  port: 8080

# JWT
jwt:
  secret: ${JWT_SECRET:CHANGE_ME_TO_A_SECURE_256BIT_SECRET_KEY}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

# Mail sender
mail:
  from:
    address: ${MAIL_FROM:noreply@example.com}
    name: 中華民國產物保險產業同業公會重大災損通報系統

logging:
  level:
    tw.org.nlia.disaster: DEBUG
    org.springframework.security: INFO
